<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0f0f1a"/>
  <!-- Candlestick 1 -->
  <line x1="7" y1="17" x2="7" y2="20" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="5" y="20" width="4" height="7" rx="1" fill="#22d3ee"/>
  <line x1="7" y1="27" x2="7" y2="30" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Candlestick 2 -->
  <line x1="16" y1="11" x2="16" y2="14" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="14" y="14" width="4" height="9" rx="1" fill="#a78bfa"/>
  <line x1="16" y1="23" x2="16" y2="26" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Candlestick 3 -->
  <line x1="25" y1="5" x2="25" y2="8" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="23" y="8" width="4" height="11" rx="1" fill="#7c3aed"/>
  <line x1="25" y1="19" x2="25" y2="22" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Trend line -->
  <polyline points="7,21 16,17 25,11" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
</svg>
